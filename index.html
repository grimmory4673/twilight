<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Feliz Cumpleaños Crepusculona</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: linear-gradient(to bottom, #1a0a2e 0%, #2d1b4e 30%, #4a2c6a 60%, #6b3d7a 100%);
            font-family: 'Cinzel', 'Georgia', serif;
            overflow: hidden;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: 
                radial-gradient(ellipse at 20% 80%, rgba(139, 69, 19, 0.15) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 20%, rgba(75, 0, 130, 0.2) 0%, transparent 50%),
                radial-gradient(ellipse at 50% 50%, rgba(0, 0, 0, 0.3) 0%, transparent 70%);
            pointer-events: none;
            z-index: 0;
        }

        .stars {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-image: 
                radial-gradient(2px 2px at 20px 30px, rgba(255,255,255,0.8), transparent),
                radial-gradient(2px 2px at 40px 70px, rgba(255,255,255,0.6), transparent),
                radial-gradient(1px 1px at 90px 40px, rgba(255,255,255,0.7), transparent),
                radial-gradient(2px 2px at 160px 120px, rgba(255,255,255,0.5), transparent),
                radial-gradient(1px 1px at 230px 80px, rgba(255,255,255,0.6), transparent),
                radial-gradient(2px 2px at 300px 150px, rgba(255,255,255,0.7), transparent),
                radial-gradient(1px 1px at 400px 60px, rgba(255,255,255,0.5), transparent),
                radial-gradient(2px 2px at 500px 180px, rgba(255,255,255,0.6), transparent),
                radial-gradient(1px 1px at 600px 90px, rgba(255,255,255,0.7), transparent),
                radial-gradient(2px 2px at 700px 130px, rgba(255,255,255,0.5), transparent);
            animation: twinkle 4s ease-in-out infinite alternate;
            pointer-events: none;
            z-index: 1;
        }

        @keyframes twinkle {
            0% { opacity: 0.6; }
            100% { opacity: 1; }
        }

        .moon {
            position: fixed;
            top: 30px;
            right: 60px;
            width: 80px;
            height: 80px;
            background: radial-gradient(circle at 30% 30%, #fffacd 0%, #f0e68c 50%, #daa520 100%);
            border-radius: 50%;
            box-shadow: 
                0 0 30px rgba(255, 250, 205, 0.6),
                0 0 60px rgba(255, 250, 205, 0.4),
                0 0 100px rgba(255, 250, 205, 0.2);
            z-index: 1;
            animation: moonGlow 4s ease-in-out infinite;
        }

        @keyframes moonGlow {
            0%, 100% { box-shadow: 0 0 30px rgba(255, 250, 205, 0.6), 0 0 60px rgba(255, 250, 205, 0.4), 0 0 100px rgba(255, 250, 205, 0.2); }
            50% { box-shadow: 0 0 50px rgba(255, 250, 205, 0.8), 0 0 100px rgba(255, 250, 205, 0.6), 0 0 150px rgba(255, 250, 205, 0.3); }
        }

        .particles {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            pointer-events: none;
            z-index: 2;
            overflow: hidden;
        }

        .particle {
            position: absolute;
            width: 4px;
            height: 4px;
            background: radial-gradient(circle, rgba(255, 255, 200, 0.9), transparent);
            border-radius: 50%;
            animation: floatParticle linear infinite;
        }

        @keyframes floatParticle {
            0% {
                transform: translateY(100vh) translateX(0) scale(0);
                opacity: 0;
            }
            10% {
                opacity: 1;
                transform: translateY(90vh) translateX(10px) scale(1);
            }
            90% {
                opacity: 1;
            }
            100% {
                transform: translateY(-10vh) translateX(-20px) scale(0.5);
                opacity: 0;
            }
        }

        .firefly {
            position: absolute;
            width: 6px;
            height: 6px;
            background: radial-gradient(circle, #ffee88, #ffcc00);
            border-radius: 50%;
            box-shadow: 0 0 10px #ffcc00, 0 0 20px #ffaa00;
            animation: fireflyFloat ease-in-out infinite;
        }

        @keyframes fireflyFloat {
            0%, 100% { 
                transform: translate(0, 0) scale(1); 
                opacity: 0.3;
            }
            25% { 
                transform: translate(30px, -40px) scale(1.2); 
                opacity: 1;
            }
            50% { 
                transform: translate(60px, -20px) scale(0.8); 
                opacity: 0.6;
            }
            75% { 
                transform: translate(20px, -60px) scale(1.1); 
                opacity: 1;
            }
        }

        .mist {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            height: 300px;
            background: linear-gradient(to top, rgba(75, 0, 130, 0.3) 0%, transparent 100%);
            animation: mistMove 8s ease-in-out infinite alternate;
            pointer-events: none;
            z-index: 3;
        }

        @keyframes mistMove {
            0% { transform: translateX(-5%); opacity: 0.5; }
            100% { transform: translateX(5%); opacity: 0.8; }
        }

        .sparkle {
            position: absolute;
            background: radial-gradient(circle, white, transparent);
            border-radius: 50%;
            animation: sparkleAnim ease-in-out infinite;
        }

        @keyframes sparkleAnim {
            0%, 100% { opacity: 0; transform: scale(0); }
            50% { opacity: 1; transform: scale(1); }
        }

        .container {
            position: relative;
            z-index: 10;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px;
        }

        .image-wrapper {
            position: relative;
            margin-bottom: 30px;
            margin-top: -50px;
            animation: fadeInDown 1.5s ease-out;
        }

        .image-wrapper::before {
            content: '';
            position: absolute;
            top: -10px;
            left: -10px;
            right: -10px;
            bottom: -10px;
            background: linear-gradient(135deg, rgba(186, 85, 211, 0.4) 0%, rgba(138, 43, 226, 0.3) 50%, rgba(75, 0, 130, 0.4) 100%);
            border-radius: 10px;
            z-index: -1;
        }

        .image-wrapper::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(to bottom, rgba(186, 85, 211, 0.1) 0%, transparent 30%, transparent 70%, rgba(75, 0, 130, 0.2) 100%);
            border-radius: 8px;
            pointer-events: none;
        }

        img {
            width: 280px;
            height: 560px;
            object-fit: cover;
            border-radius: 8px;
            box-shadow: 
                0 10px 30px rgba(0, 0, 0, 0.5),
                0 0 20px rgba(186, 85, 211, 0.3),
                inset 0 0 20px rgba(0, 0, 0, 0.3);
        }

        .text-container {
            text-align: center;
            animation: fadeInUp 1.5s ease-out 0.5s both;
        }

        h1 {
            color: #e8d5e8;
            font-size: 28px;
            text-shadow: 
                0 0 10px rgba(186, 85, 211, 0.8),
                0 0 20px rgba(138, 43, 226, 0.6),
                0 2px 4px rgba(0, 0, 0, 0.5);
            letter-spacing: 3px;
            line-height: 1.6;
            font-weight: 400;
        }

        .subtitle {
            color: #c9a0c9;
            font-size: 16px;
            margin-top: 15px;
            font-style: italic;
            text-shadow: 0 0 10px rgba(200, 150, 200, 0.5);
        }

        @keyframes fadeInDown {
            from {
                opacity: 0;
                transform: translateY(-30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes glow {
            0%, 100% {
                text-shadow: 
                    0 0 10px rgba(186, 85, 211, 0.8),
                    0 0 20px rgba(138, 43, 226, 0.6),
                    0 2px 4px rgba(0, 0, 0, 0.5);
            }
            50% {
                text-shadow: 
                    0 0 20px rgba(186, 85, 211, 1),
                    0 0 40px rgba(138, 43, 226, 0.8),
                    0 0 60px rgba(138, 43, 226, 0.4),
                    0 2px 4px rgba(0, 0, 0, 0.5);
            }
        }

        h1 {
            animation: glow 3s ease-in-out infinite;
        }

        .vampire-rose {
            position: fixed;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 40px;
            animation: pulse 2s ease-in-out infinite;
            z-index: 15;
            filter: drop-shadow(0 0 10px rgba(220, 20, 60, 0.8));
        }

        @keyframes pulse {
            0%, 100% { transform: translateX(-50%) scale(1); filter: drop-shadow(0 0 10px rgba(220, 20, 60, 0.8)); }
            50% { transform: translateX(-50%) scale(1.15); filter: drop-shadow(0 0 20px rgba(220, 20, 60, 1)); }
        }

        @media (max-width: 600px) {
            body {
                min-height: 100vh;
                overflow-x: hidden;
            }

            .moon {
                top: 15px;
                right: 20px;
                width: 50px;
                height: 50px;
            }

            .container {
                padding: 20px;
                padding-top: 60px;
            }

            .image-wrapper {
                margin-bottom: 20px;
                margin-top: 0;
            }

            img {
                width: 200px;
                height: 400px;
            }

            h1 {
                font-size: 20px;
                letter-spacing: 2px;
                line-height: 1.5;
            }

            .subtitle {
                font-size: 14px;
            }

            .vampire-rose {
                bottom: 20px;
                font-size: 30px;
            }

            .mist {
                height: 150px;
            }

            .particles {
                overflow: hidden;
            }
        }

        @media (max-width: 400px) {
            img {
                width: 160px;
                height: 320px;
            }

            h1 {
                font-size: 18px;
            }

            .container {
                padding: 15px;
                padding-top: 50px;
            }
        }

        .play-button {
            position: fixed;
            top: 20px;
            left: 20px;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            border: 2px solid rgba(186, 85, 211, 0.6);
            background: rgba(75, 0, 130, 0.4);
            color: #e8d5e8;
            font-size: 24px;
            cursor: pointer;
            z-index: 100;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .play-button:hover {
            background: rgba(186, 85, 211, 0.6);
            transform: scale(1.1);
        }

        .play-button.playing {
            animation: musicPulse 1s ease-in-out infinite;
        }

        @keyframes musicPulse {
            0%, 100% { box-shadow: 0 0 10px rgba(186, 85, 211, 0.5); }
            50% { box-shadow: 0 0 20px rgba(186, 85, 211, 0.8); }
        }
    </style>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&display=swap" rel="stylesheet">
</head>
<body>
    <div class="stars"></div>
    <div class="moon"></div>
    <div class="particles">
        <div class="particle" style="left: 5%; animation-duration: 12s; animation-delay: 0s;"></div>
        <div class="particle" style="left: 15%; animation-duration: 14s; animation-delay: 2s;"></div>
        <div class="particle" style="left: 25%; animation-duration: 11s; animation-delay: 1s;"></div>
        <div class="particle" style="left: 35%; animation-duration: 15s; animation-delay: 3s;"></div>
        <div class="particle" style="left: 45%; animation-duration: 13s; animation-delay: 0.5s;"></div>
        <div class="particle" style="left: 55%; animation-duration: 12s; animation-delay: 2.5s;"></div>
        <div class="particle" style="left: 65%; animation-duration: 16s; animation-delay: 1.5s;"></div>
        <div class="particle" style="left: 75%; animation-duration: 11s; animation-delay: 4s;"></div>
        <div class="particle" style="left: 85%; animation-duration: 14s; animation-delay: 0.8s;"></div>
        <div class="particle" style="left: 95%; animation-duration: 13s; animation-delay: 3.5s;"></div>
        <div class="particle" style="left: 10%; animation-duration: 15s; animation-delay: 5s;"></div>
        <div class="particle" style="left: 30%; animation-duration: 12s; animation-delay: 6s;"></div>
        <div class="particle" style="left: 50%; animation-duration: 14s; animation-delay: 4.5s;"></div>
        <div class="particle" style="left: 70%; animation-duration: 11s; animation-delay: 7s;"></div>
        <div class="particle" style="left: 90%; animation-duration: 16s; animation-delay: 5.5s;"></div>
        <div class="firefly" style="left: 20%; top: 60%; animation-duration: 6s; animation-delay: 0s;"></div>
        <div class="firefly" style="left: 70%; top: 40%; animation-duration: 8s; animation-delay: 2s;"></div>
        <div class="firefly" style="left: 50%; top: 70%; animation-duration: 7s; animation-delay: 4s;"></div>
        <div class="firefly" style="left: 80%; top: 55%; animation-duration: 9s; animation-delay: 1s;"></div>
    </div>
    <div class="mist"></div>
    
    <div class="container">
        <div class="image-wrapper">
            <img src="lobo.jpg" alt="Lobo">
        </div>
        
        <div class="text-container">
            <h1>Feliz cumpleaños Crepusculona,<br>que cumplas muchos años más como vampira</h1>
            <p class="subtitle">besos en la cola</p>
        </div>
    </div>
    
    <div class="vampire-rose">🌹</div>

    <audio id="audio" loop>
        <source src="Eyes on Fire.mp3" type="audio/mpeg">
    </audio>
    
    <button id="playBtn" class="play-button" aria-label="Reproducir música">🎵</button>

    <script>
        const audio = document.getElementById('audio');
        const playBtn = document.getElementById('playBtn');
        let isPlaying = false;

        playBtn.addEventListener('click', function() {
            if (isPlaying) {
                audio.pause();
                playBtn.textContent = '🎵';
                playBtn.classList.remove('playing');
            } else {
                audio.play().catch(function(e) {
                    console.log('Error playing audio:', e);
                });
                playBtn.textContent = '⏸';
                playBtn.classList.add('playing');
            }
            isPlaying = !isPlaying;
        });
    </script>
</body>
</html>
